<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>$harp $elections — Daily Selections</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Pacifico&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
–bg: #0a0c10;
–surface: #10141c;
–surface2: #161c28;
–border: #1e2636;
–accent: #c8f535;
–accent2: #3b82f6;
–danger: #ef4444;
–success: #22c55e;
–text: #e8eaf0;
–muted: #5a6278;
–nfl: #d97706;
–nba: #2563eb;
–mlb: #dc2626;
–nhl: #0891b2;
–ncaaf: #7c3aed;
–ncaam: #be185d;
}

- { box-sizing: border-box; margin: 0; padding: 0; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
overflow-x: hidden;
}

/* ─── LOGIN ─── */
#login-screen {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
position: relative;
background: radial-gradient(ellipse at 30% 50%, #0d1a2a 0%, var(–bg) 65%);
}

.login-grid-bg {
position: absolute; inset: 0;
background-image:
linear-gradient(rgba(59,130,246,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(59,130,246,0.05) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none;
}

.login-box {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
padding: 48px 44px;
width: 100%;
max-width: 420px;
position: relative;
box-shadow: 0 40px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(200,245,53,0.08);
animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1);
}

.login-box::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 2px;
background: linear-gradient(90deg, transparent, #3b82f6, transparent);
}

.login-logo-wrap {
margin-bottom: 28px;
margin-left: -12px;
margin-right: -12px;
}

.field { margin-bottom: 18px; }

.field label {
display: block;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: var(–muted);
font-family: ‘DM Mono’, monospace;
margin-bottom: 8px;
}

.field input, .field select, .field textarea {
width: 100%;
background: var(–bg);
border: 1px solid var(–border);
color: var(–text);
padding: 12px 16px;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
border-radius: 2px;
outline: none;
transition: border-color 0.2s;
}

.field input:focus, .field select:focus, .field textarea:focus {
border-color: var(–accent);
box-shadow: 0 0 0 2px rgba(200,245,53,0.08);
}

.field select option { background: var(–surface); }

.btn {
display: inline-flex; align-items: center; justify-content: center; gap: 8px;
padding: 13px 24px;
border: none; cursor: pointer; border-radius: 2px;
font-family: ‘DM Mono’, monospace;
font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
font-weight: 500; transition: all 0.2s;
}

.btn-primary {
background: var(–accent); color: #0a0c10;
width: 100%;
}
.btn-primary:hover { background: #d9f54a; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(200,245,53,0.25); }

.btn-secondary {
background: var(–surface2); color: var(–text);
border: 1px solid var(–border);
}
.btn-secondary:hover { border-color: var(–accent); color: var(–accent); }

.btn-danger {
background: rgba(239,68,68,0.12); color: var(–danger);
border: 1px solid rgba(239,68,68,0.25);
}
.btn-danger:hover { background: rgba(239,68,68,0.2); }

.btn-success {
background: rgba(34,197,94,0.12); color: var(–success);
border: 1px solid rgba(34,197,94,0.25);
}
.btn-success:hover { background: rgba(34,197,94,0.2); }

.btn-sm { padding: 8px 14px; font-size: 10px; }

.error-msg {
background: rgba(239,68,68,0.1);
border: 1px solid rgba(239,68,68,0.3);
color: var(–danger);
padding: 10px 14px; border-radius: 2px;
font-size: 13px; margin-top: 12px;
font-family: ‘DM Mono’, monospace;
}

/* ─── MAIN APP ─── */
#app { display: none; min-height: 100vh; }

.topbar {
background: var(–surface);
border-bottom: 1px solid var(–border);
padding: 0 32px;
display: flex; align-items: center; justify-content: space-between;
height: 60px;
position: sticky; top: 0; z-index: 100;
}

.topbar-logo {
font-family: ‘Pacifico’, cursive;
font-size: 22px;
color: #c8f535;
-webkit-text-stroke: 2px #4477ff;
paint-order: stroke fill;
text-shadow: 0 0 12px #c8f535, 0 0 30px rgba(68,119,255,0.6);
}

.topbar-right { display: flex; align-items: center; gap: 16px; }

.user-badge {
display: flex; align-items: center; gap: 8px;
font-size: 12px; font-family: ‘DM Mono’, monospace;
color: var(–muted);
}

.user-badge .role-tag {
background: rgba(200,245,53,0.12);
color: var(–accent); border: 1px solid rgba(200,245,53,0.25);
padding: 2px 8px; border-radius: 20px; font-size: 10px;
letter-spacing: 1px; text-transform: uppercase;
}

.role-tag.user-role {
background: rgba(59,130,246,0.12);
color: var(–accent2); border-color: rgba(59,130,246,0.25);
}

/* ─── NAV TABS ─── */
.nav-tabs {
display: flex; gap: 0;
background: var(–surface2);
border-bottom: 1px solid var(–border);
padding: 0 32px;
overflow-x: auto;
}

.nav-tab {
padding: 14px 20px;
font-family: ‘DM Mono’, monospace;
font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
color: var(–muted); cursor: pointer;
border-bottom: 2px solid transparent;
transition: all 0.2s; white-space: nowrap;
background: none; border-top: none; border-left: none; border-right: none;
}

.nav-tab:hover { color: var(–text); }
.nav-tab.active { color: var(–accent); border-bottom-color: var(–accent); }

/* ─── CONTENT ─── */
.content { padding: 32px; max-width: 1200px; margin: 0 auto; }

.page { display: none; }
.page.active { display: block; animation: fadeIn 0.3s ease; }

/* ─── DATE BAR ─── */
.date-bar {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 28px; flex-wrap: wrap; gap: 16px;
}

.date-display {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 32px; letter-spacing: 2px; color: var(–accent);
}

.date-sub {
font-family: ‘DM Mono’, monospace;
font-size: 11px; color: var(–muted); letter-spacing: 2px; text-transform: uppercase;
}

/* ─── SPORT TABS ─── */
.sport-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; }

.sport-chip {
padding: 6px 16px;
border-radius: 2px;
font-family: ‘DM Mono’, monospace;
font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
cursor: pointer; border: 1px solid var(–border);
background: transparent; color: var(–muted); transition: all 0.2s;
}

.sport-chip[data-sport=“ALL”].active, .sport-chip[data-sport=“ALL”]:hover { color: var(–accent); border-color: var(–accent); background: rgba(200,245,53,0.08); }
.sport-chip[data-sport=“NFL”].active, .sport-chip[data-sport=“NFL”]:hover { color: var(–nfl); border-color: var(–nfl); background: rgba(217,119,6,0.08); }
.sport-chip[data-sport=“NBA”].active, .sport-chip[data-sport=“NBA”]:hover { color: var(–nba); border-color: var(–nba); background: rgba(37,99,235,0.08); }
.sport-chip[data-sport=“MLB”].active, .sport-chip[data-sport=“MLB”]:hover { color: var(–mlb); border-color: var(–mlb); background: rgba(220,38,38,0.08); }
.sport-chip[data-sport=“NHL”].active, .sport-chip[data-sport=“NHL”]:hover { color: var(–nhl); border-color: var(–nhl); background: rgba(8,145,178,0.08); }
.sport-chip[data-sport=“NCAAF”].active, .sport-chip[data-sport=“NCAAF”]:hover { color: var(–ncaaf); border-color: var(–ncaaf); background: rgba(124,58,237,0.08); }
.sport-chip[data-sport=“NCAAM”].active, .sport-chip[data-sport=“NCAAM”]:hover { color: var(–ncaam); border-color: var(–ncaam); background: rgba(190,24,93,0.08); }

/* ─── PICKS TABLE ─── */
.section-header {
display: flex; align-items: center; justify-content: space-between;
margin-bottom: 16px;
}

.section-title {
font-family: ‘DM Mono’, monospace;
font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(–muted);
}

.picks-grid { display: flex; flex-direction: column; gap: 10px; }

.pick-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
padding: 18px 20px;
display: grid;
grid-template-columns: 80px 1fr 120px 120px 100px 80px;
align-items: center; gap: 16px;
transition: border-color 0.2s;
}

.pick-card:hover { border-color: rgba(200,245,53,0.2); }

.pick-sport-badge {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 16px; letter-spacing: 2px;
padding: 4px 10px; border-radius: 2px; text-align: center;
}

.sport-NFL { color: var(–nfl); background: rgba(217,119,6,0.1); border: 1px solid rgba(217,119,6,0.2); }
.sport-NBA { color: var(–nba); background: rgba(37,99,235,0.1); border: 1px solid rgba(37,99,235,0.2); }
.sport-MLB { color: var(–mlb); background: rgba(220,38,38,0.1); border: 1px solid rgba(220,38,38,0.2); }
.sport-NHL { color: var(–nhl); background: rgba(8,145,178,0.1); border: 1px solid rgba(8,145,178,0.2); }
.sport-NCAAF { color: var(–ncaaf); background: rgba(124,58,237,0.1); border: 1px solid rgba(124,58,237,0.2); }
.sport-NCAAM { color: var(–ncaam); background: rgba(190,24,93,0.1); border: 1px solid rgba(190,24,93,0.2); }

.pick-teams { font-weight: 500; font-size: 14px; }
.pick-teams .matchup { color: var(–muted); font-size: 12px; margin-top: 2px; font-family: ‘DM Mono’, monospace; }

.pick-type {
font-family: ‘DM Mono’, monospace; font-size: 12px; color: var(–muted);
}

.pick-selection { font-weight: 600; font-size: 14px; }

.pick-odds {
font-family: ‘DM Mono’, monospace; font-size: 13px;
color: var(–accent);
}

.pick-result {
font-family: ‘DM Mono’, monospace; font-size: 12px;
padding: 4px 10px; border-radius: 2px; text-align: center;
}

.result-win { background: rgba(34,197,94,0.12); color: var(–success); border: 1px solid rgba(34,197,94,0.2); }
.result-loss { background: rgba(239,68,68,0.12); color: var(–danger); border: 1px solid rgba(239,68,68,0.2); }
.result-push { background: rgba(90,98,120,0.2); color: var(–muted); border: 1px solid var(–border); }
.result-pending { background: rgba(200,245,53,0.08); color: var(–accent); border: 1px solid rgba(200,245,53,0.15); }

/* ─── ADD PICK FORM ─── */
.add-pick-form {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
padding: 28px; margin-bottom: 28px;
position: relative;
}

.add-pick-form::before {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0; height: 2px;
background: linear-gradient(90deg, var(–accent), transparent);
}

.form-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
gap: 16px;
}

/* ─── STATS ─── */
.stats-row {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 12px; margin-bottom: 28px;
}

.stat-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px; padding: 20px;
}

.stat-label {
font-family: ‘DM Mono’, monospace;
font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(–muted);
margin-bottom: 8px;
}

.stat-value {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 36px; letter-spacing: 1px; color: var(–accent);
}

.stat-value.green { color: var(–success); }
.stat-value.red { color: var(–danger); }

/* ─── ADMIN USERS ─── */
.users-table {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px; overflow: hidden;
}

.users-table table { width: 100%; border-collapse: collapse; }
.users-table th {
background: var(–surface2);
padding: 12px 16px; text-align: left;
font-family: ‘DM Mono’, monospace; font-size: 10px;
letter-spacing: 2px; text-transform: uppercase; color: var(–muted);
border-bottom: 1px solid var(–border);
}

.users-table td {
padding: 14px 16px;
border-bottom: 1px solid var(–border);
font-size: 13px;
}

.users-table tr:last-child td { border-bottom: none; }
.users-table tr:hover td { background: rgba(255,255,255,0.02); }

/* ─── MODAL ─── */
.modal-overlay {
position: fixed; inset: 0;
background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
display: flex; align-items: center; justify-content: center;
z-index: 1000; padding: 20px;
opacity: 0; pointer-events: none; transition: opacity 0.2s;
}

.modal-overlay.open { opacity: 1; pointer-events: all; }

.modal {
background: var(–surface);
border: 1px solid var(–border);
border-radius: 2px;
padding: 36px; width: 100%; max-width: 480px;
position: relative;
transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
}

.modal-overlay.open .modal { transform: translateY(0); }

.modal-title {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 28px; letter-spacing: 2px; color: var(–accent);
margin-bottom: 24px;
}

.modal-close {
position: absolute; top: 16px; right: 16px;
background: none; border: none; color: var(–muted);
cursor: pointer; font-size: 20px; padding: 4px 8px;
transition: color 0.2s;
}
.modal-close:hover { color: var(–text); }

/* ─── EMPTY STATE ─── */
.empty-state {
text-align: center; padding: 60px 20px;
color: var(–muted); font-family: ‘DM Mono’, monospace;
font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
border: 1px dashed var(–border); border-radius: 2px;
}

.empty-state .icon { font-size: 36px; margin-bottom: 16px; opacity: 0.3; }

/* ─── ANIMATIONS ─── */
@keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(–bg); }
::-webkit-scrollbar-thumb { background: var(–border); border-radius: 2px; }

/* ─── RESPONSIVE ─── */
@media (max-width: 768px) {
.content { padding: 16px; }
.topbar { padding: 0 16px; }
.nav-tabs { padding: 0 16px; }
.pick-card { grid-template-columns: 1fr 1fr; font-size: 12px; }
.pick-type, .pick-odds { display: none; }
}

.note-card {
background: var(–surface); border: 1px solid var(–border);
border-radius: 2px; padding: 16px 20px; margin-bottom: 8px;
font-size: 13px; line-height: 1.6;
}

.note-card .note-meta {
font-family: ‘DM Mono’, monospace; font-size: 10px;
color: var(–muted); letter-spacing: 1px; margin-bottom: 6px;
}

.pick-actions { display: flex; gap: 6px; }

.inline-edit { background: transparent; border: none; color: var(–text); font-family: inherit; font-size: inherit; width: 100%; cursor: pointer; }
</style>

</head>

<script>
// ═══════════════════════════════════════════
// DATA STORE (localStorage for persistence)
// ═══════════════════════════════════════════
function getData(key, def) {
  try { var v = localStorage.getItem(key); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function setData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function initUsers() {
  var users = getData('sp_users', null);
  if (!users) {
    setData('sp_users', [
      { id: 'u1', username: 'admin', password: 'admin123', role: 'admin', status: 'active', created: new Date().toISOString() },
      { id: 'u2', username: 'user1', password: 'user123', role: 'user', status: 'active', created: new Date().toISOString() }
    ]);
  }
}

initUsers();

var currentUser = null;
var currentSportFilter = 'ALL';
var currentDateView = todayStr();
var editingUserId = null;

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function formatDateDisplay(d) {
  var months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  var parts = d.split('-');
  return months[+parts[1]-1] + ' ' + +parts[2] + ', ' + parts[0];
}

// ═══════════════════════════════════════════
// AUTH
// ═══════════════════════════════════════════
function doLogin() {
  var u = document.getElementById('login-user').value.trim();
  var p = document.getElementById('login-pass').value;
  var errEl = document.getElementById('login-error');
  var users = getData('sp_users', []);
  var found = null;
  for (var i = 0; i < users.length; i++) {
    if (users[i].username === u && users[i].password === p && users[i].status === 'active') { found = users[i]; break; }
  }
  if (!found) {
    errEl.textContent = 'Invalid credentials. Please try again.';
    errEl.style.display = 'block';
    return;
  }
  currentUser = found;
  errEl.style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  setupAppForRole();
}

function doLogout() {
  currentUser = null;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-user').value = '';
  document.getElementById('login-pass').value = '';
  showPage('picks', document.querySelector('.nav-tab'));
}

function setupAppForRole() {
  document.getElementById('topbar-username').textContent = currentUser.username;
  var roleEl = document.getElementById('topbar-role');
  roleEl.textContent = currentUser.role;
  roleEl.className = 'role-tag' + (currentUser.role === 'admin' ? '' : ' user-role');

  var adminEls = document.querySelectorAll('.admin-only');
  for (var i = 0; i < adminEls.length; i++) {
    adminEls[i].style.display = currentUser.role === 'admin' ? '' : 'none';
  }

  var today = todayStr();
  currentDateView = today;
  document.getElementById('today-date').textContent = formatDateDisplay(today);
  document.getElementById('pick-date-selector').value = today;
  document.getElementById('pick-form-date').value = today;

  showPage('picks', document.querySelectorAll('.nav-tab')[0]);
  loadPicksForDate(today);
  renderHistory();
  renderStats();
  if (currentUser.role === 'admin') {
    renderAdminPicks();
    renderUsersTable();
  }
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function showPage(name, tab) {
  var pages = document.querySelectorAll('.page');
  for (var i = 0; i < pages.length; i++) pages[i].classList.remove('active');
  var tabs = document.querySelectorAll('.nav-tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  document.getElementById('page-' + name).classList.add('active');
  if (tab) tab.classList.add('active');
  if (name === 'admin') renderAdminPicks();
  if (name === 'users') renderUsersTable();
  if (name === 'stats') renderStats();
  if (name === 'history') renderHistory();
}

// ═══════════════════════════════════════════
// PICKS
// ═══════════════════════════════════════════
function getPicks() { return getData('sp_picks', []); }
function savePicks(picks) { setData('sp_picks', picks); }

function loadPicksForDate(date) {
  currentDateView = date;
  document.getElementById('today-date').textContent = formatDateDisplay(date);
  renderPicks();
}

function filterSport(sport, el) {
  currentSportFilter = sport;
  var chips = document.querySelectorAll('.sport-chip');
  for (var i = 0; i < chips.length; i++) chips[i].classList.remove('active');
  el.classList.add('active');
  renderPicks();
}

function renderPicks() {
  var picks = getPicks();
  var dated = [];
  for (var i = 0; i < picks.length; i++) { if (picks[i].date === currentDateView) dated.push(picks[i]); }
  var filtered = currentSportFilter === 'ALL' ? dated : dated.filter(function(p){ return p.sport === currentSportFilter; });
  var container = document.getElementById('picks-container');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🎯</div>No picks for this date' + (currentSportFilter !== 'ALL' ? ' / sport' : '') + '</div>';
    return;
  }
  container.innerHTML = filtered.map(function(p){ return pickCardHTML(p, false); }).join('');
}

function pickCardHTML(p, adminMode) {
  var resultMap = { WIN: 'result-win', LOSS: 'result-loss', PUSH: 'result-push', PENDING: 'result-pending' };
  var resultClass = resultMap[p.result] || 'result-pending';
  var resultLabel = p.result || 'PENDING';
  return '<div class="pick-card">'
    + '<div class="pick-sport-badge sport-' + p.sport + '">' + p.sport + '</div>'
    + '<div class="pick-teams">' + p.away + ' @ ' + p.home
    + '<div class="matchup">' + formatDateDisplay(p.date) + '</div></div>'
    + '<div class="pick-type">' + p.type + '</div>'
    + '<div class="pick-selection">' + p.selection + '</div>'
    + '<div class="pick-odds">' + (p.odds || '—') + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;">'
    + '<span class="pick-result ' + resultClass + '">' + resultLabel + '</span>'
    + (adminMode ? '<div class="pick-actions">'
      + '<button class="btn btn-secondary btn-sm" onclick="openResultModal(\'' + p.id + '\')">Result</button>'
      + '<button class="btn btn-danger btn-sm" onclick="deletePick(\'' + p.id + '\')">✕</button>'
      + '</div>' : '')
    + '</div></div>'
    + (p.notes ? '<div class="note-card"><div class="note-meta">' + p.sport + ' · ' + p.type + ' · ' + (p.units || 1) + 'u</div>' + p.notes + '</div>' : '');
}

function openAddPickModal() {
  document.getElementById('pick-form-date').value = currentDateView;
  openModal('modal-add-pick');
}

function savePick() {
  var sport     = document.getElementById('pick-sport').value;
  var date      = document.getElementById('pick-form-date').value;
  var away      = document.getElementById('pick-away').value.trim();
  var home      = document.getElementById('pick-home').value.trim();
  var type      = document.getElementById('pick-type').value;
  var selection = document.getElementById('pick-selection').value.trim();
  var odds      = document.getElementById('pick-odds').value.trim();
  var units     = document.getElementById('pick-units').value || 1;
  var notes     = document.getElementById('pick-notes').value.trim();

  if (!away || !home || !selection) { alert('Please fill in all required fields.'); return; }

  var picks = getPicks();
  picks.push({
    id: 'p' + Date.now(),
    sport: sport, date: date, away: away, home: home, type: type,
    selection: selection, odds: odds, units: units,
    notes: notes, result: 'PENDING', createdBy: currentUser.username, created: new Date().toISOString()
  });
  savePicks(picks);
  closeModal('modal-add-pick');
  clearPickForm();
  loadPicksForDate(currentDateView);
  renderAdminPicks();
  renderStats();
  renderHistory();
}

function clearPickForm() {
  var ids = ['pick-away','pick-home','pick-selection','pick-odds','pick-notes'];
  for (var i = 0; i < ids.length; i++) document.getElementById(ids[i]).value = '';
  document.getElementById('pick-units').value = 1;
}

function deletePick(id) {
  if (!confirm('Delete this pick?')) return;
  var picks = getPicks().filter(function(p){ return p.id !== id; });
  savePicks(picks);
  renderAdminPicks();
  renderPicks();
  renderHistory();
  renderStats();
}

function openResultModal(id) {
  document.getElementById('result-pick-id').value = id;
  var picks = getPicks();
  for (var i = 0; i < picks.length; i++) {
    if (picks[i].id === id) { document.getElementById('result-select').value = picks[i].result || 'PENDING'; break; }
  }
  openModal('modal-result');
}

function saveResult() {
  var id = document.getElementById('result-pick-id').value;
  var result = document.getElementById('result-select').value;
  var picks = getPicks();
  for (var i = 0; i < picks.length; i++) { if (picks[i].id === id) { picks[i].result = result; break; } }
  savePicks(picks);
  closeModal('modal-result');
  renderAdminPicks();
  renderPicks();
  renderHistory();
  renderStats();
}

// ═══════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════
function renderHistory() {
  var sportEl = document.getElementById('hist-sport');
  var resultEl = document.getElementById('hist-result');
  var sport = sportEl ? sportEl.value : 'ALL';
  var result = resultEl ? resultEl.value : 'ALL';
  var picks = getPicks();
  if (sport !== 'ALL') picks = picks.filter(function(p){ return p.sport === sport; });
  if (result !== 'ALL') picks = picks.filter(function(p){ return (p.result || 'PENDING') === result; });
  picks.sort(function(a,b){ return b.date.localeCompare(a.date); });

  var container = document.getElementById('history-container');
  if (picks.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No picks match the filter</div>';
    return;
  }
  container.innerHTML = picks.map(function(p){ return pickCardHTML(p, false); }).join('');
}

// ═══════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════
function renderStats() {
  var all = getPicks();
  var picks = all.filter(function(p){ return p.result !== 'PENDING'; });
  var wins = picks.filter(function(p){ return p.result === 'WIN'; }).length;
  var losses = picks.filter(function(p){ return p.result === 'LOSS'; }).length;
  var pushes = picks.filter(function(p){ return p.result === 'PUSH'; }).length;
  var total = wins + losses;
  var pct = total > 0 ? Math.round((wins/total)*100) : 0;

  document.getElementById('overall-stats').innerHTML =
    '<div class="stat-card"><div class="stat-label">Win %</div><div class="stat-value ' + (pct >= 55 ? 'green' : pct < 45 ? 'red' : '') + '">' + pct + '%</div></div>'
    + '<div class="stat-card"><div class="stat-label">Total Picks</div><div class="stat-value">' + picks.length + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">Wins</div><div class="stat-value green">' + wins + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">Losses</div><div class="stat-value red">' + losses + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">Pushes</div><div class="stat-value">' + pushes + '</div></div>'
    + '<div class="stat-card"><div class="stat-label">Record</div><div class="stat-value">' + wins + '-' + losses + '</div></div>';

  var sports = ['NFL','NBA','MLB','NHL','NCAAF','NCAAM'];
  document.getElementById('sport-stats').innerHTML = sports.map(function(s) {
    var sp = picks.filter(function(p){ return p.sport === s; });
    var sw = sp.filter(function(p){ return p.result === 'WIN'; }).length;
    var sl = sp.filter(function(p){ return p.result === 'LOSS'; }).length;
    var spct = (sw + sl) > 0 ? Math.round((sw/(sw+sl))*100) : 0;
    var varName = s === 'NCAAF' ? 'ncaaf' : s === 'NCAAM' ? 'ncaam' : s.toLowerCase();
    return '<div class="stat-card" style="border-top:2px solid var(--' + varName + ');">'
      + '<div class="stat-label">' + s + '</div>'
      + '<div class="stat-value" style="font-size:28px;">' + sw + '-' + sl + '</div>'
      + '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);margin-top:4px;">' + spct + '% · ' + sp.length + ' picks</div>'
      + '</div>';
  }).join('');
}

// ═══════════════════════════════════════════
// ADMIN PICKS
// ═══════════════════════════════════════════
function renderAdminPicks() {
  var container = document.getElementById('admin-picks-container');
  if (!container) return;
  var picks = getPicks().sort(function(a,b){ return b.date.localeCompare(a.date); });
  if (picks.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No picks yet. Add your first pick!</div>';
    return;
  }
  container.innerHTML = picks.map(function(p){ return pickCardHTML(p, true); }).join('');
}

// ═══════════════════════════════════════════
// USER MANAGEMENT
// ═══════════════════════════════════════════
function renderUsersTable() {
  var users = getData('sp_users', []);
  var tbody = document.getElementById('users-tbody');
  if (!tbody) return;
  tbody.innerHTML = users.map(function(u) {
    return '<tr>'
      + '<td style="font-family:\'DM Mono\',monospace;font-size:13px;">' + u.username + '</td>'
      + '<td><span class="role-tag ' + (u.role !== 'admin' ? 'user-role' : '') + '">' + u.role + '</span></td>'
      + '<td><span class="pick-result ' + (u.status === 'active' ? 'result-win' : 'result-loss') + '">' + u.status + '</span></td>'
      + '<td style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--muted);">' + u.created.split('T')[0] + '</td>'
      + '<td><div style="display:flex;gap:6px;">'
      + (u.username !== 'admin' ?
          '<button class="btn btn-secondary btn-sm" onclick="toggleUserStatus(\'' + u.id + '\')">' + (u.status === 'active' ? 'Deactivate' : 'Activate') + '</button>'
          + '<button class="btn btn-secondary btn-sm" onclick="openEditUser(\'' + u.id + '\')">Edit</button>'
          + '<button class="btn btn-danger btn-sm" onclick="deleteUser(\'' + u.id + '\')">Delete</button>'
        : '<span style="color:var(--muted);font-size:12px;font-family:\'DM Mono\',monospace;">Protected</span>')
      + '</div></td></tr>';
  }).join('');
}

function openAddUserModal() {
  editingUserId = null;
  document.getElementById('user-modal-title').textContent = 'ADD USER';
  document.getElementById('save-user-btn').textContent = 'Add User';
  document.getElementById('new-username').value = '';
  document.getElementById('new-password').value = '';
  document.getElementById('new-role').value = 'user';
  document.getElementById('user-error').style.display = 'none';
  openModal('modal-add-user');
}

function openEditUser(id) {
  editingUserId = id;
  var users = getData('sp_users', []);
  var user = null;
  for (var i = 0; i < users.length; i++) { if (users[i].id === id) { user = users[i]; break; } }
  if (!user) return;
  document.getElementById('user-modal-title').textContent = 'EDIT USER';
  document.getElementById('save-user-btn').textContent = 'Save Changes';
  document.getElementById('new-username').value = user.username;
  document.getElementById('new-password').value = '';
  document.getElementById('new-role').value = user.role;
  document.getElementById('user-error').style.display = 'none';
  openModal('modal-add-user');
}

function saveUser() {
  var username = document.getElementById('new-username').value.trim();
  var password = document.getElementById('new-password').value;
  var role = document.getElementById('new-role').value;
  var errEl = document.getElementById('user-error');

  if (!username) { errEl.textContent = 'Username is required.'; errEl.style.display = 'block'; return; }
  if (!editingUserId && !password) { errEl.textContent = 'Password is required.'; errEl.style.display = 'block'; return; }

  var users = getData('sp_users', []);

  if (editingUserId) {
    for (var i = 0; i < users.length; i++) {
      if (users[i].id === editingUserId) {
        users[i].username = username;
        users[i].role = role;
        if (password) users[i].password = password;
        break;
      }
    }
  } else {
    for (var i = 0; i < users.length; i++) {
      if (users[i].username === username) { errEl.textContent = 'Username already exists.'; errEl.style.display = 'block'; return; }
    }
    users.push({ id: 'u' + Date.now(), username: username, password: password, role: role, status: 'active', created: new Date().toISOString() });
  }

  setData('sp_users', users);
  closeModal('modal-add-user');
  renderUsersTable();
}

function toggleUserStatus(id) {
  var users = getData('sp_users', []);
  for (var i = 0; i < users.length; i++) {
    if (users[i].id === id) { users[i].status = users[i].status === 'active' ? 'inactive' : 'active'; break; }
  }
  setData('sp_users', users);
  renderUsersTable();
}

function deleteUser(id) {
  if (!confirm('Delete this user permanently?')) return;
  setData('sp_users', getData('sp_users', []).filter(function(u){ return u.id !== id; }));
  renderUsersTable();
}

// ═══════════════════════════════════════════
// MODALS
// ═══════════════════════════════════════════
function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

var overlays = document.querySelectorAll('.modal-overlay');
for (var i = 0; i < overlays.length; i++) {
  overlays[i].addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
}
</script>
