<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharp Selections</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0c0e; min-height: 100vh; color: #e8edf2; font-family: 'Rajdhani', sans-serif; font-size: 16px; }
#app { min-height: 100vh; background: #0a0c0e; }

.neon-title {
font-family: ‘Pacifico’, cursive;
color: #c8f535;
-webkit-text-stroke: 2px #3b82f6;
paint-order: stroke fill;
text-shadow: 0 0 20px rgba(200,245,53,0.5), 0 0 40px rgba(200,245,53,0.2);
}

/* buttons */
.btn-green {
display: block; width: 100%; cursor: pointer;
background: #c8f535; color: #0a0c0e;
font-family: ‘Bebas Neue’, sans-serif; font-size: 1rem; letter-spacing: 0.08em;
border: none; border-radius: 6px; padding: 12px 20px;
-webkit-transition: opacity 0.2s; transition: opacity 0.2s;
}
.btn-green:hover { opacity: 0.85; }
.btn-green:disabled { opacity: 0.4; cursor: not-allowed; }

.btn-blue {
cursor: pointer; background: transparent; color: #3b82f6;
font-family: ‘Bebas Neue’, sans-serif; font-size: 0.85rem; letter-spacing: 0.08em;
border: 1px solid #3b82f6; border-radius: 6px; padding: 6px 14px;
}
.btn-red {
cursor: pointer; background: transparent; color: #ff4444;
font-family: ‘Bebas Neue’, sans-serif; font-size: 0.78rem; letter-spacing: 0.06em;
border: 1px solid #ff4444; border-radius: 4px; padding: 5px 11px;
}
.btn-lime {
cursor: pointer; background: transparent; color: #c8f535;
font-family: ‘Bebas Neue’, sans-serif; font-size: 0.78rem; letter-spacing: 0.06em;
border: 1px solid #c8f535; border-radius: 4px; padding: 5px 11px;
}

/* inputs */
.inp {
background: #0d1117; border: 1px solid #2a3344; border-radius: 6px;
color: #e8edf2; font-family: ‘Rajdhani’, sans-serif; font-size: 0.95rem;
padding: 10px 13px; width: 100%;
-webkit-appearance: none; appearance: none;
}
.inp:focus { outline: none; border-color: #3b82f6; }
select.inp { padding-right: 30px; }
textarea.inp { resize: vertical; }
.lbl { display: block; font-size: 0.72rem; letter-spacing: 0.05em; color: #6b7a8d; text-transform: uppercase; margin-bottom: 5px; }

/* layout */
.card { background: #111518; border: 1px solid #1e2530; border-radius: 12px; padding: 20px; }
.row  { display: -webkit-flex; display: flex; gap: 12px; }
.row > * { -webkit-flex: 1; flex: 1; }
.col  { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 13px; }
.wrap { display: -webkit-flex; display: flex; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 16px; }
.wrap > .pick-card { width: calc(50% - 8px); min-width: 280px; }
@media (max-width: 640px) { .wrap > .pick-card { width: 100%; } .row { -webkit-flex-wrap: wrap; flex-wrap: wrap; } }

/* tabs */
.tab {
background: transparent; color: #6b7a8d;
font-family: ‘Bebas Neue’, sans-serif; font-size: 0.95rem; letter-spacing: 0.08em;
border: none; border-bottom: 2px solid transparent;
padding: 10px 16px; cursor: pointer; white-space: nowrap;
}
.tab.on { color: #c8f535; border-bottom-color: #c8f535; }

/* header */
#hdr {
background: #0d1015; border-bottom: 1px solid #1e2530;
position: -webkit-sticky; position: sticky; top: 0; z-index: 100;
}
.hdr-in {
max-width: 1200px; margin: 0 auto; padding: 13px 20px;
display: -webkit-flex; display: flex;
-webkit-align-items: center; align-items: center;
-webkit-justify-content: space-between; justify-content: space-between;
gap: 10px;
}

/* pick card */
.pick-card { background: #111518; border: 1px solid #1e2530; border-radius: 12px; overflow: hidden; }

/* stats */
.stats { display: -webkit-flex; display: flex; gap: 12px; margin-bottom: 28px; }
.stat  { background: #0d1117; border: 1px solid #1e2530; border-radius: 8px; padding: 14px; text-align: center; -webkit-flex: 1; flex: 1; }

/* sport filter */
.filters { display: -webkit-flex; display: flex; gap: 4px; overflow-x: auto; margin-bottom: 22px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }

/* alerts */
.err  { color: #ff4444; font-size: 0.83rem; background: rgba(255,68,68,0.1); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,68,68,0.25); }
.warn { color: #f0c040; font-size: 0.8rem;  background: rgba(240,192,64,0.08); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(240,192,64,0.2); }
.ok   { color: #c8f535; font-size: 0.85rem; text-align: center; padding: 6px; }

/* admin two col */
.two-col { display: -webkit-flex; display: flex; gap: 24px; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.two-col > div { -webkit-flex: 1; flex: 1; min-width: 280px; }

/* users */
.urow { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: space-between; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #1a2030; -webkit-flex-wrap: wrap; flex-wrap: wrap; gap: 10px; }
.urow:last-child { border-bottom: none; }

footer { border-top: 1px solid #1e2530; padding: 20px; text-align: center; margin-top: 40px; }
.page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
.demo { margin-top: 14px; padding: 11px; background: #0d1117; border-radius: 7px; font-size: 0.74rem; color: #6b7a8d; }
.manage-list { display: -webkit-flex; display: flex; -webkit-flex-direction: column; flex-direction: column; gap: 7px; }
.manage-row { background: #0d1117; border: 1px solid #1e2530; border-radius: 8px; padding: 11px 14px; display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; gap: 10px; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.game-row { padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; background: #0d1117; border: 1px solid #1e2530; }
.game-row.sel { background: rgba(200,245,53,0.08); border-color: rgba(200,245,53,0.35); }
.games-scroll { max-height: 320px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.sbadge { font-family: ‘Bebas Neue’, sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 4px; display: inline-block; }
.rbadge { font-family: ‘Bebas Neue’, sans-serif; font-size: 0.82rem; letter-spacing: 0.1em; padding: 4px 11px; border-radius: 4px; }
.deco { height: 2px; background: #3b82f6; width: 160px; margin: 3px auto 2px; }
.grid3 { display: -webkit-flex; display: flex; gap: 10px; -webkit-flex-wrap: wrap; flex-wrap: wrap; }
.grid3 > div { -webkit-flex: 1; flex: 1; min-width: 80px; }
</style>

</head>
<body>
<div id="app"><p style="color:#c8f535;padding:40px;">Loading...</p></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
var USERS = [
  { id:1, username:"admin",      password:"admin123", role:"admin", active:true,  email:"admin@sharpselections.com", joined:"2024-01-01" },
  { id:2, username:"john_doe",   password:"pass123",  role:"user",  active:true,  email:"john@example.com",          joined:"2024-03-01" },
  { id:3, username:"jane_smith", password:"pass123",  role:"user",  active:false, email:"jane@example.com",          joined:"2024-03-10" }
];
var PICKS = [
  { id:1, sport:"NBA", date:"2026-03-06", homeTeam:"Los Angeles Lakers",  awayTeam:"Boston Celtics",
    pick:"Boston Celtics -3.5", betType:"Spread",    odds:"-110",
    analysis:"Celtics have won 8 straight and Lakers are shorthanded. Fade the home chalk.",
    result:"WIN", gameTime:"7:30 PM ET", active:true },
  { id:2, sport:"NHL", date:"2026-03-06", homeTeam:"Colorado Avalanche",  awayTeam:"Vegas Golden Knights",
    pick:"Over 6.5",            betType:"Total",     odds:"-115",
    analysis:"Both teams averaging 4+ goals at home this month. Expect a shootout.",
    result:"PENDING", gameTime:"9:00 PM ET", active:true },
  { id:3, sport:"NFL", date:"2026-03-06", homeTeam:"Kansas City Chiefs",  awayTeam:"Buffalo Bills",
    pick:"Chiefs ML",           betType:"Moneyline", odds:"-130",
    analysis:"Chiefs at home in the playoffs. Mahomes elevates every big spot.",
    result:"WIN", gameTime:"4:25 PM ET", active:true }
];

var ESPN_MAP = {
  NFL:  { s:"football",   l:"nfl" },
  NBA:  { s:"basketball", l:"nba" },
  NHL:  { s:"hockey",     l:"nhl" },
  MLB:  { s:"baseball",   l:"mlb" },
  NCAAF:{ s:"football",   l:"college-football" },
  NCAAM:{ s:"basketball", l:"mens-college-basketball" }
};
var SC = { NFL:"#d4380d", NBA:"#c41230", NHL:"#1560bd", MLB:"#003087", NCAAF:"#bf5700", NCAAM:"#4b0082" };

// ── STATE ─────────────────────────────────────────────────────────────────
var curUser   = null;
var curPage   = "picks";
var adminTab  = "add";
var sfilt     = "ALL";
var authMode  = "login";

// ── TINY DOM HELPERS ──────────────────────────────────────────────────────
function ge(id)    { return document.getElementById(id); }
function val(id)   { var el = ge(id); return el ? el.value : ""; }
function sv(id, v) { var el = ge(id); if (el) el.value = v; }

function esc(s) {
  s = s == null ? "" : String(s);
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function todayStr() {
  var d = new Date();
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  return d.getFullYear() + "-" + (mm < 10 ? "0"+mm : mm) + "-" + (dd < 10 ? "0"+dd : dd);
}
function rcol(r) { return r === "WIN" ? "#39ff14" : r === "LOSS" ? "#ff3b3b" : "#f0c040"; }
function fmtDate() {
  return new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" });
}

// ── ESPN XHR ──────────────────────────────────────────────────────────────
function espnFetch(sport, date, cb) {
  var map = ESPN_MAP[sport];
  if (!map) { cb([]); return; }
  var ds  = date.replace(/-/g, "");
  var url = "https://site.api.espn.com/apis/site/v2/sports/" + map.s + "/" + map.l + "/scoreboard?dates=" + ds;
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.timeout = 10000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    try {
      var data = JSON.parse(xhr.responseText);
      var out  = [];
      var evts = data.events || [];
      for (var i = 0; i < evts.length; i++) {
        var e    = evts[i];
        var comp = e.competitions && e.competitions[0] ? e.competitions[0] : {};
        var ctrs = comp.competitors || [];
        var home = null, away = null;
        for (var j = 0; j < ctrs.length; j++) {
          if (ctrs[j].homeAway === "home") home = ctrs[j];
          else                              away = ctrs[j];
        }
        var t = "";
        if (comp.date) {
          try { t = new Date(comp.date).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", timeZoneName:"short" }); }
          catch(ignore) {}
        }
        out.push({
          id:       e.id || ("x" + i),
          homeTeam: home && home.team ? home.team.displayName || "Home" : "Home",
          awayTeam: away && away.team ? away.team.displayName || "Away" : "Away",
          gameTime: t,
          venue:    comp.venue && comp.venue.fullName ? comp.venue.fullName : ""
        });
      }
      cb(out);
    } catch(err) { cb([]); }
  };
  xhr.onerror   = function() { cb([]); };
  xhr.ontimeout = function() { cb([]); };
  xhr.send();
}

// ── LOGO ──────────────────────────────────────────────────────────────────
function logoHTML(titleSize, subSize) {
  return "<div id='logo-btn' style='cursor:pointer;text-align:left'>"
       + "<div class='neon-title' style='font-size:" + titleSize + ";line-height:1'>$harp $elections</div>"
       + "<div class='deco'></div>"
       + "<div style='color:#c8f535;font-family:Bebas Neue,sans-serif;letter-spacing:0.25em;text-align:center;font-size:" + subSize + ";margin-top:1px'>BET $HARP</div>"
       + "</div>";
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────
function render() {
  try {
    var app = ge("app");
    if (!app) { setTimeout(render, 50); return; }
    if (curUser) {
      app.innerHTML = buildHeader() + "<main id='main'>" + (curPage === "admin" && curUser.role === "admin" ? buildAdmin() : buildPicks()) + "</main>" + buildFooter();
    } else {
      app.innerHTML = buildAuth();
    }
    attachEvents();
  } catch(e) {
    var app2 = ge("app");
    if (app2) app2.innerHTML = "<p style='color:#ff4444;padding:40px;font-size:1.2rem'>Error: " + e.message + "</p>";
  }
}

// ── AUTH ──────────────────────────────────────────────────────────────────
function buildAuth() {
  var isReg = (authMode === "register");
  var html = "<div style='min-height:100vh;background:#0a0c0e;display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px'>";
  html += "<div style='width:100%;max-width:420px'>";
  html += "<div style='text-align:center;margin-bottom:28px'>" + logoHTML("2.8rem","0.85rem") + "</div>";
  html += "<div class='card' style='border-color:#2a3344'>";
  html += "<div style='display:-webkit-flex;display:flex;border-bottom:1px solid #1e2530;margin-bottom:20px'>";
  html += "<button class='tab " + (authMode==="login"?"on":"") + "' id='btn-tab-login'>LOGIN</button>";
  html += "<button class='tab " + (isReg?"on":"") + "' id='btn-tab-reg'>REGISTER</button>";
  html += "</div>";
  html += "<div class='col'>";
  html += "<div><span class='lbl'>Username</span><input class='inp' id='a-user' placeholder='Enter username' autocomplete='username'></div>";
  if (isReg) { html += "<div><span class='lbl'>Email</span><input class='inp' id='a-email' type='email' placeholder='Enter email'></div>"; }
  html += "<div><span class='lbl'>Password</span><input class='inp' id='a-pass' type='password' placeholder='Enter password' autocomplete='current-password'></div>";
  if (isReg) { html += "<div><span class='lbl'>Confirm Password</span><input class='inp' id='a-conf' type='password' placeholder='Confirm password'></div>"; }
  html += "<div id='a-err'></div>";
  html += "<button class='btn-green' id='btn-auth' style='font-size:1.1rem;padding:12px'>" + (isReg ? "CREATE ACCOUNT" : "LOGIN") + "</button>";
  html += "</div>";
  if (!isReg) { html += "<div class='demo'><strong style='color:#c8f535'>Demo:</strong> admin / admin123</div>"; }
  html += "</div></div></div>";
  return html;
}

// ── HEADER ────────────────────────────────────────────────────────────────
function buildHeader() {
  var html = "<header id='hdr'><div class='hdr-in'>";
  html += logoHTML("1.5rem","0.52rem");
  html += "<div style='display:-webkit-flex;display:flex;-webkit-align-items:center;align-items:center;gap:10px;-webkit-flex-wrap:wrap;flex-wrap:wrap'>";
  if (curUser.role === "admin") {
    html += "<button class='tab " + (curPage==="admin"?"on":"") + "' id='btn-admin'>&#9881; ADMIN</button>";
  }
  html += "<button class='tab " + (curPage==="picks"?"on":"") + "' id='btn-picks'>PICKS</button>";
  html += "<div style='text-align:right'><div style='font-size:0.68rem;color:#6b7a8d'>Logged in as</div><div style='font-size:0.88rem;color:#c8f535;font-weight:700'>" + esc(curUser.username) + "</div></div>";
  html += "<button class='btn-blue' id='btn-logout'>LOGOUT</button>";
  html += "</div></div></header>";
  return html;
}

function buildFooter() {
  return "<footer><div class='neon-title' style='font-size:0.95rem;display:inline'>$harp $elections</div><div style='color:#6b7a8d;font-size:0.68rem;margin-top:6px'>Gambling can be addictive. Please bet responsibly. Must be 21+ to wager.</div></footer>";
}

// ── PICKS PAGE ────────────────────────────────────────────────────────────
function buildPicks() {
  var sports  = ["ALL","NFL","NBA","NHL","MLB","NCAAF","NCAAM"];
  var active  = [];
  for (var i = 0; i < PICKS.length; i++) { if (PICKS[i].active) active.push(PICKS[i]); }
  var shown   = [];
  for (var i = 0; i < active.length; i++) { if (sfilt === "ALL" || active[i].sport === sfilt) shown.push(active[i]); }
  var w=0, l=0, p=0;
  for (var i = 0; i < active.length; i++) {
    if (active[i].result==="WIN") w++; else if (active[i].result==="LOSS") l++; else p++;
  }

  var html = "<div class='page-wrap'>";

  // stats
  html += "<div class='stats'>";
  html += "<div class='stat'><div style='color:#39ff14;font-family:Bebas Neue,sans-serif;font-size:2rem'>" + w + "</div><div style='color:#6b7a8d;font-size:0.72rem;letter-spacing:0.08em'>WINS</div></div>";
  html += "<div class='stat'><div style='color:#ff4444;font-family:Bebas Neue,sans-serif;font-size:2rem'>" + l + "</div><div style='color:#6b7a8d;font-size:0.72rem;letter-spacing:0.08em'>LOSSES</div></div>";
  html += "<div class='stat'><div style='color:#f0c040;font-family:Bebas Neue,sans-serif;font-size:2rem'>" + p + "</div><div style='color:#6b7a8d;font-size:0.72rem;letter-spacing:0.08em'>PENDING</div></div>";
  html += "</div>";

  // filters
  html += "<div class='filters'>";
  for (var i = 0; i < sports.length; i++) {
    html += "<button class='tab sf " + (sfilt===sports[i]?"on":"") + "' data-sp='" + sports[i] + "' style='font-size:0.83rem'>" + sports[i] + "</button>";
  }
  html += "</div>";

  html += "<div style='display:-webkit-flex;display:flex;-webkit-align-items:baseline;align-items:baseline;gap:12px;margin-bottom:16px'>";
  html += "<h2 style='font-family:Bebas Neue,sans-serif;font-size:1.5rem;letter-spacing:0.08em'>TODAY'S PICKS</h2>";
  html += "<span style='color:#6b7a8d;font-size:0.84rem'>" + fmtDate() + "</span>";
  html += "</div>";

  if (shown.length === 0) {
    html += "<div style='text-align:center;padding:60px 20px;color:#6b7a8d'>";
    html += "<div style='font-size:3rem;margin-bottom:12px'>&#128203;</div>";
    html += "<div style='font-family:Bebas Neue,sans-serif;font-size:1.4rem;letter-spacing:0.08em'>NO PICKS AVAILABLE</div>";
    html += "<div style='font-size:0.84rem;margin-top:8px'>Check back soon for today's sharp selections.</div>";
    html += "</div>";
  } else {
    html += "<div class='wrap'>";
    for (var i = 0; i < shown.length; i++) { html += buildPickCard(shown[i]); }
    html += "</div>";
  }

  html += "</div>";
  return html;
}

function buildPickCard(p) {
  var sc   = SC[p.sport] || "#6b7a8d";
  var col  = rcol(p.result);
  var rbg  = p.result==="WIN" ? "rgba(57,255,20,0.12)" : p.result==="LOSS" ? "rgba(255,60,60,0.12)" : "rgba(240,192,64,0.12)";
  var rbd  = p.result==="WIN" ? "#39ff14" : p.result==="LOSS" ? "#ff3b3b" : "#f0c040";
  var cbrdr= p.result==="WIN" ? "rgba(57,255,20,0.25)" : p.result==="LOSS" ? "rgba(255,60,60,0.25)" : "#1e2530";
  var html = "<div class='pick-card' style='border-color:" + cbrdr + "'>";
  html += "<div style='height:3px;background:-webkit-linear-gradient(left," + sc + ",transparent);background:linear-gradient(90deg," + sc + ",transparent)'></div>";
  html += "<div style='padding:16px'>";
  html += "<div style='display:-webkit-flex;display:flex;-webkit-justify-content:space-between;justify-content:space-between;-webkit-align-items:flex-start;align-items:flex-start;margin-bottom:11px'>";
  html += "<span class='sbadge' style='background:" + sc + "22;color:" + sc + ";border:1px solid " + sc + "55'>" + esc(p.sport) + "</span>";
  html += "<span class='rbadge' style='background:" + rbg + ";color:" + col + ";border:1px solid " + rbd + "55'>" + esc(p.result) + "</span>";
  html += "</div>";
  html += "<div style='margin-bottom:11px'>";
  html += "<div style='font-size:0.73rem;color:#6b7a8d;margin-bottom:3px'>" + esc(p.gameTime) + "</div>";
  html += "<div style='font-family:Bebas Neue,sans-serif;font-size:0.98rem;letter-spacing:0.04em;line-height:1.3'>" + esc(p.awayTeam) + " <span style='color:#6b7a8d;font-size:0.78rem'>@</span> " + esc(p.homeTeam) + "</div>";
  html += "</div>";
  html += "<div style='background:rgba(200,245,53,0.06);border:1px solid rgba(200,245,53,0.18);border-radius:8px;padding:10px 13px;margin-bottom:11px'>";
  html += "<div style='font-size:0.68rem;color:#6b7a8d;letter-spacing:0.08em;margin-bottom:3px'>SHARP PICK</div>";
  html += "<div style='color:#c8f535;font-family:Bebas Neue,sans-serif;font-size:1.18rem;letter-spacing:0.04em'>" + esc(p.pick) + "</div>";
  html += "<div style='display:-webkit-flex;display:flex;gap:12px;margin-top:4px'>";
  html += "<span style='font-size:0.73rem;color:#6b7a8d'>" + esc(p.betType) + "</span>";
  html += "<span style='font-size:0.73rem;color:#3b82f6'>" + esc(p.odds) + "</span>";
  html += "</div></div>";
  html += "<p style='font-size:0.81rem;color:#8a9ab0;line-height:1.55'>" + esc(p.analysis) + "</p>";
  html += "</div></div>";
  return html;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function buildAdmin() {
  var html = "<div class='page-wrap'>";
  html += "<div style='margin-bottom:22px'><h1 style='font-family:Bebas Neue,sans-serif;font-size:2rem;letter-spacing:0.1em;color:#c8f535'>ADMIN PANEL</h1><p style='color:#6b7a8d;font-size:0.84rem'>Manage picks, users, and settings</p></div>";
  html += "<div style='display:-webkit-flex;display:flex;gap:4px;border-bottom:1px solid #1e2530;margin-bottom:26px'>";

refreshAC();
});
})(tps[i]);
}

// delete pick
var dps = document.querySelectorAll(”[data-dp]”);
for (var i = 0; i < dps.length; i++) {
(function(btn) {

var id = parseInt(btn.getAttribute(“data-dp”), 10);

for (var j = 0; j < next.length; j++) PICKS.push(next[j]);
refreshAC();
});
})(dps[i]);
}

// toggle user
var tus = document.querySelectorAll(”[data-tu]”);
for (var i = 0; i < tus.length; i++) {
(function(btn) {
btn.addEventListener(“click”, function() {
var id = parseInt(btn.getAttribute(“data-tu”), 10);
for (var j = 0; j < USERS.length; j++) { if (USERS[j].id === id) { USERS[j].active = !USERS[j].active; break; } }
refreshAC();
});
})(tus[i]);
}
}

// ── AUTH LOGIC ────────────────────────────────────────────────────────────
function doAuth() {
var errEl = ge(“a-err”);
if (errEl) errEl.innerHTML = “”;
var username = val(“a-user”).trim();
var password = val(“a-pass”).trim();

if (authMode === “login”) {
var found = null;
for (var i = 0; i < USERS.length; i++) {
if (USERS[i].username === username && USERS[i].password === password) { found = USERS[i]; break; }
}
if (!found)        { if (errEl) errEl.innerHTML = “<div class='err'>Invalid username or password.</div>”; return; }
if (!found.active) { if (errEl) errEl.innerHTML = “<div class='err'>Your account has been deactivated. Please contact support.</div>”; return; }
curUser = found; curPage = “picks”; render();
} else {
var email   = val(“a-email”).trim();
var confirm = val(“a-conf”).trim();
if (!username || !email || !password) { if (errEl) errEl.innerHTML = “<div class='err'>All fields are required.</div>”; return; }
if (password !== confirm)             { if (errEl) errEl.innerHTML = “<div class='err'>Passwords do not match.</div>”; return; }
for (var i = 0; i < USERS.length; i++) {
if (USERS[i].username === username) { if (errEl) errEl.innerHTML = “<div class='err'>Username already taken.</div>”; return; }
}
var nu = { id: Date.now(), username:username, email:email, password:password, role:“user”, active:true, joined:todayStr() };
USERS.push(nu);
curUser = nu; curPage = “picks”; render();
}
}
