<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sharp Selections</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #0a0c0e; min-height: 100vh; color: #e8edf2; font-family: 'Rajdhani', sans-serif; }

.neon-title {
font-family: ‘Pacifico’, cursive;
color: #c8f535;
-webkit-text-stroke: 2px #3b82f6;
paint-order: stroke fill;
text-shadow: 0 0 20px rgba(200,245,53,0.5), 0 0 50px rgba(200,245,53,0.2);
}

.btn-green {
display: block; width: 100%; cursor: pointer;
background: #c8f535; color: #0a0c0e;
font-family: ‘Bebas Neue’, sans-serif; font-size: 1rem; letter-spacing: 0.08em;
border: none; border-radius: 6px; padding: 12px 20px;
}
.btn-green:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-blue { cursor: pointer; background: transparent; color: #3b82f6; font-family: ‘Bebas Neue’, sans-serif; font-size: 0.85rem; letter-spacing: 0.08em; border: 1px solid #3b82f6; border-radius: 6px; padding: 6px 14px; }
.btn-red  { cursor: pointer; background: transparent; color: #ff4444; font-family: ‘Bebas Neue’, sans-serif; font-size: 0.78rem; border: 1px solid #ff4444; border-radius: 4px; padding: 5px 11px; }
.btn-lime { cursor: pointer; background: transparent; color: #c8f535; font-family: ‘Bebas Neue’, sans-serif; font-size: 0.78rem; border: 1px solid #c8f535; border-radius: 4px; padding: 5px 11px; }

.inp {
background: #0d1117; border: 1px solid #2a3344; border-radius: 6px;
color: #e8edf2; font-family: ‘Rajdhani’, sans-serif; font-size: 0.95rem;
padding: 10px 13px; width: 100%; -webkit-appearance: none; appearance: none;
}
.inp:focus { outline: none; border-color: #3b82f6; }
textarea.inp { resize: vertical; }
.lbl { display: block; font-size: 0.72rem; letter-spacing: 0.05em; color: #6b7a8d; text-transform: uppercase; margin-bottom: 5px; }

.card { background: #111518; border: 1px solid #1e2530; border-radius: 12px; padding: 20px; }

.tab { background: transparent; color: #6b7a8d; font-family: ‘Bebas Neue’, sans-serif; font-size: 0.95rem; letter-spacing: 0.08em; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; cursor: pointer; white-space: nowrap; }
.tab.on { color: #c8f535; border-bottom-color: #c8f535; }

#hdr { background: #0d1015; border-bottom: 1px solid #1e2530; position: -webkit-sticky; position: sticky; top: 0; z-index: 100; }
.hdr-in { max-width: 1200px; margin: 0 auto; padding: 13px 20px; display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }

.deco { height: 2px; background: #3b82f6; width: 160px; margin: 3px auto 2px; }

.stats { display: flex; gap: 12px; margin-bottom: 28px; }
.stat  { background: #0d1117; border: 1px solid #1e2530; border-radius: 8px; padding: 14px; text-align: center; flex: 1; }

.filters { display: flex; gap: 4px; overflow-x: auto; margin-bottom: 22px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; }

.picks-grid { display: flex; flex-wrap: wrap; gap: 16px; }
.pick-card  { background: #111518; border: 1px solid #1e2530; border-radius: 12px; overflow: hidden; width: calc(50% - 8px); min-width: 280px; }
@media (max-width: 640px) { .pick-card { width: 100%; } }

.sbadge { font-family: ‘Bebas Neue’, sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; padding: 3px 9px; border-radius: 4px; display: inline-block; }
.rbadge { font-family: ‘Bebas Neue’, sans-serif; font-size: 0.82rem; letter-spacing: 0.1em; padding: 4px 11px; border-radius: 4px; }

.err  { color: #ff4444; font-size: 0.83rem; background: rgba(255,68,68,0.1); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(255,68,68,0.25); margin-top: 6px; }
.warn { color: #f0c040; font-size: 0.8rem; background: rgba(240,192,64,0.08); padding: 8px 12px; border-radius: 6px; border: 1px solid rgba(240,192,64,0.2); margin-top: 6px; }
.ok   { color: #c8f535; font-size: 0.85rem; text-align: center; padding: 6px; }

.two-col { display: flex; gap: 24px; flex-wrap: wrap; }
.two-col > div { flex: 1; min-width: 280px; }
.form-col { display: flex; flex-direction: column; gap: 13px; }
.form-row { display: flex; gap: 12px; }
.form-row > div { flex: 1; }
.form-row3 { display: flex; gap: 10px; flex-wrap: wrap; }
.form-row3 > div { flex: 1; min-width: 80px; }

.manage-list { display: flex; flex-direction: column; gap: 7px; }
.manage-row  { background: #0d1117; border: 1px solid #1e2530; border-radius: 8px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.games-scroll { max-height: 320px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
.game-row { padding: 10px 12px; border-radius: 8px; margin-bottom: 6px; cursor: pointer; background: #0d1117; border: 1px solid #1e2530; }
.game-row.sel { background: rgba(200,245,53,0.08); border-color: rgba(200,245,53,0.35); }

.urow { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid #1a2030; flex-wrap: wrap; gap: 10px; }
.urow:last-child { border-bottom: none; }

.page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
footer { border-top: 1px solid #1e2530; padding: 20px; text-align: center; margin-top: 40px; }
.demo { margin-top: 14px; padding: 11px; background: #0d1117; border-radius: 7px; font-size: 0.74rem; color: #6b7a8d; }
</style>

</head>
<body>

<div id="app"></div>

<!-- ALL JS at bottom of body so DOM is guaranteed ready -->

<script>

// ── DATA ──────────────────────────────────────────────────────────────────
var USERS = [
  { id:1, username:"admin",      password:"admin123", role:"admin", active:true,  email:"admin@sharpselections.com", joined:"2024-01-01" },
  { id:2, username:"john_doe",   password:"pass123",  role:"user",  active:true,  email:"john@example.com",          joined:"2024-03-01" },
  { id:3, username:"jane_smith", password:"pass123",  role:"user",  active:false, email:"jane@example.com",          joined:"2024-03-10" }
];

var PICKS = [
  { id:1, sport:"NBA", date:"2026-03-06", homeTeam:"Los Angeles Lakers", awayTeam:"Boston Celtics",
    pick:"Boston Celtics -3.5", betType:"Spread", odds:"-110",
    analysis:"Celtics have won 8 straight and Lakers are shorthanded. Fade the home chalk.",
    result:"WIN", gameTime:"7:30 PM ET", active:true },
  { id:2, sport:"NHL", date:"2026-03-06", homeTeam:"Colorado Avalanche", awayTeam:"Vegas Golden Knights",
    pick:"Over 6.5", betType:"Total", odds:"-115",
    analysis:"Both teams averaging 4+ goals at home this month. Expect a shootout.",
    result:"PENDING", gameTime:"9:00 PM ET", active:true },
  { id:3, sport:"NFL", date:"2026-03-06", homeTeam:"Kansas City Chiefs", awayTeam:"Buffalo Bills",
    pick:"Chiefs ML", betType:"Moneyline", odds:"-130",
    analysis:"Chiefs at home in the playoffs. Mahomes elevates every big spot.",
    result:"WIN", gameTime:"4:25 PM ET", active:true }
];

var ESPN_MAP = {
  NFL:  { s:"football",   l:"nfl" },
  NBA:  { s:"basketball", l:"nba" },
  NHL:  { s:"hockey",     l:"nhl" },
  MLB:  { s:"baseball",   l:"mlb" },
  NCAAF:{ s:"football",   l:"college-football" },
  NCAAM:{ s:"basketball", l:"mens-college-basketball" }
};

var SPORT_COLORS = { NFL:"#d4380d", NBA:"#c41230", NHL:"#1560bd", MLB:"#003087", NCAAF:"#bf5700", NCAAM:"#4b0082" };

// ── STATE ─────────────────────────────────────────────────────────────────
var curUser  = null;
var curPage  = "picks";
var adminTab = "add";
var sfilt    = "ALL";
var authMode = "login";

// ── HELPERS ───────────────────────────────────────────────────────────────
function ge(id)    { return document.getElementById(id); }
function val(id)   { var el = ge(id); return el ? el.value : ""; }
function sv(id, v) { var el = ge(id); if (el) el.value = v; }

function esc(s) {
  if (s == null) return "";
  s = String(s);
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function todayStr() {
  var d  = new Date();
  var mm = d.getMonth() + 1;
  var dd = d.getDate();
  return d.getFullYear() + "-" + (mm < 10 ? "0"+mm : mm) + "-" + (dd < 10 ? "0"+dd : dd);
}

function rcol(r) {
  if (r === "WIN")  return "#39ff14";
  if (r === "LOSS") return "#ff3b3b";
  return "#f0c040";
}

function fmtDate() {
  try { return new Date().toLocaleDateString("en-US", { weekday:"long", month:"long", day:"numeric" }); }
  catch(e) { return ""; }
}

function clamp(el, fn) {
  var nodes = document.querySelectorAll(el);
  for (var i = 0; i < nodes.length; i++) fn(nodes[i], i);
}

// ── ESPN ──────────────────────────────────────────────────────────────────
function espnFetch(sport, date, cb) {
  var map = ESPN_MAP[sport];
  if (!map) { cb([]); return; }
  var ds  = date.replace(/-/g, "");
  var url = "https://site.api.espn.com/apis/site/v2/sports/" + map.s + "/" + map.l + "/scoreboard?dates=" + ds;
  var xhr = new XMLHttpRequest();
  xhr.open("GET", url, true);
  xhr.timeout = 10000;
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    try {
      var data = JSON.parse(xhr.responseText);
      var out  = [];
      var evts = data.events || [];
      for (var i = 0; i < evts.length; i++) {
        var ev   = evts[i];
        var comp = ev.competitions && ev.competitions[0] ? ev.competitions[0] : {};
        var ctrs = comp.competitors || [];
        var home = null, away = null;
        for (var j = 0; j < ctrs.length; j++) {
          if (ctrs[j].homeAway === "home") home = ctrs[j];
          else                              away = ctrs[j];
        }
        var t = "";
        if (comp.date) {
          try { t = new Date(comp.date).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", timeZoneName:"short" }); }
          catch(ignore) {}
        }
        out.push({
          homeTeam: home && home.team && home.team.displayName ? home.team.displayName : "Home",
          awayTeam: away && away.team && away.team.displayName ? away.team.displayName : "Away",
          gameTime: t,
          venue:    comp.venue && comp.venue.fullName ? comp.venue.fullName : ""
        });
      }
      cb(out);
    } catch(err) { cb([]); }
  };
  xhr.onerror   = function() { cb([]); };
  xhr.ontimeout = function() { cb([]); };
  xhr.send();
}

// ── LOGO ──────────────────────────────────────────────────────────────────
function logoHTML(titleSz, subSz) {
  return ''
    + '<div id="logo-btn" style="cursor:pointer">'
    + '<div class="neon-title" style="font-size:' + titleSz + ';line-height:1">$harp $elections</div>'
    + '<div class="deco"></div>'
    + '<div style="color:#c8f535;font-family:Bebas Neue,sans-serif;letter-spacing:0.25em;text-align:center;font-size:' + subSz + ';margin-top:1px">BET $HARP</div>'
    + '</div>';
}

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  var app = ge("app");
  if (!app) return;
  if (curUser) {
    app.innerHTML = buildHeader() + '<main id="main">' + (curPage === "admin" && curUser.role === "admin" ? buildAdmin() : buildPicks()) + '</main>' + buildFooter();
  } else {
    app.innerHTML = buildAuth();
  }
  bindAll();
}

// ── AUTH PAGE ─────────────────────────────────────────────────────────────
function buildAuth() {
  var isReg = authMode === "register";
  var h = '';
  h += '<div style="min-height:100vh;background:#0a0c0e;display:flex;align-items:center;justify-content:center;padding:20px">';
  h += '<div style="width:100%;max-width:420px">';
  h += '<div style="text-align:center;margin-bottom:28px">' + logoHTML("2.8rem","0.85rem") + '</div>';
  h += '<div class="card" style="border-color:#2a3344">';
  h += '<div style="display:flex;border-bottom:1px solid #1e2530;margin-bottom:20px">';
  h += '<button class="tab ' + (authMode==="login" ? "on" : "") + '" id="tab-login">LOGIN</button>';
  h += '<button class="tab ' + (isReg ? "on" : "") + '" id="tab-reg">REGISTER</button>';
  h += '</div>';
  h += '<div class="form-col">';
  h += '<div><span class="lbl">Username</span><input class="inp" id="a-user" placeholder="Enter username" autocomplete="username"></div>';
  if (isReg) h += '<div><span class="lbl">Email</span><input class="inp" id="a-email" type="email" placeholder="Enter email"></div>';
  h += '<div><span class="lbl">Password</span><input class="inp" id="a-pass" type="password" placeholder="Enter password" autocomplete="current-password"></div>';
  if (isReg) h += '<div><span class="lbl">Confirm Password</span><input class="inp" id="a-conf" type="password" placeholder="Confirm password"></div>';
  h += '<div id="a-err"></div>';
  h += '<button class="btn-green" id="btn-auth" style="font-size:1.1rem;padding:12px">' + (isReg ? "CREATE ACCOUNT" : "LOGIN") + '</button>';
  h += '</div>';
  if (!isReg) h += '<div class="demo"><strong style="color:#c8f535">Demo:</strong> admin / admin123</div>';
  h += '</div></div></div>';
  return h;
}

// ── HEADER ────────────────────────────────────────────────────────────────
function buildHeader() {
  var h = '<header id="hdr"><div class="hdr-in">';
  h += logoHTML("1.5rem","0.52rem");
  h += '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">';
  if (curUser.role === "admin") {
    h += '<button class="tab ' + (curPage==="admin" ? "on" : "") + '" id="btn-admin">&#9881; ADMIN</button>';
  }
  h += '<button class="tab ' + (curPage==="picks" ? "on" : "") + '" id="btn-picks">PICKS</button>';
  h += '<div style="text-align:right"><div style="font-size:0.68rem;color:#6b7a8d">Logged in as</div>';
  h += '<div style="font-size:0.88rem;color:#c8f535;font-weight:700">' + esc(curUser.username) + '</div></div>';
  h += '<button class="btn-blue" id="btn-logout">LOGOUT</button>';
  h += '</div></div></header>';
  return h;
}

function buildFooter() {
  return '<footer><div class="neon-title" style="font-size:0.95rem;display:inline">$harp $elections</div><div style="color:#6b7a8d;font-size:0.68rem;margin-top:6px">Gambling can be addictive. Please bet responsibly. Must be 21+ to wager.</div></footer>';
}

// ── PICKS PAGE ────────────────────────────────────────────────────────────
function buildPicks() {
  var sports = ["ALL","NFL","NBA","NHL","MLB","NCAAF","NCAAM"];
  var active = [], shown = [], w=0, l=0, p=0;
  for (var i=0; i<PICKS.length; i++) if (PICKS[i].active) active.push(PICKS[i]);
  for (var i=0; i<active.length; i++) {
    if (sfilt === "ALL" || active[i].sport === sfilt) shown.push(active[i]);
    if (active[i].result === "WIN") w++;
    else if (active[i].result === "LOSS") l++;
    else p++;
  }

  var h = '<div class="page-wrap">';

  h += '<div class="stats">';
  h += '<div class="stat"><div style="color:#39ff14;font-family:Bebas Neue,sans-serif;font-size:2rem">' + w + '</div><div style="color:#6b7a8d;font-size:0.72rem;letter-spacing:0.08em">WINS</div></div>';
  h += '<div class="stat"><div style="color:#ff4444;font-family:Bebas Neue,sans-serif;font-size:2rem">' + l + '</div><div style="color:#6b7a8d;font-size:0.72rem;letter-spacing:0.08em">LOSSES</div></div>';
  h += '<div class="stat"><div style="color:#f0c040;font-family:Bebas Neue,sans-serif;font-size:2rem">' + p + '</div><div style="color:#6b7a8d;font-size:0.72rem;letter-spacing:0.08em">PENDING</div></div>';
  h += '</div>';

  h += '<div class="filters">';
  for (var i=0; i<sports.length; i++) {
    h += '<button class="tab sf ' + (sfilt===sports[i] ? "on" : "") + '" data-sp="' + sports[i] + '" style="font-size:0.83rem">' + sports[i] + '</button>';
  }
  h += '</div>';

  h += '<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:16px">';
  h += '<h2 style="font-family:Bebas Neue,sans-serif;font-size:1.5rem;letter-spacing:0.08em">TODAY\'S PICKS</h2>';
  h += '<span style="color:#6b7a8d;font-size:0.84rem">' + fmtDate() + '</span>';
  h += '</div>';

  if (!shown.length) {
    h += '<div style="text-align:center;padding:60px 20px;color:#6b7a8d">';
    h += '<div style="font-size:3rem;margin-bottom:12px">&#128203;</div>';
    h += '<div style="font-family:Bebas Neue,sans-serif;font-size:1.4rem;letter-spacing:0.08em">NO PICKS AVAILABLE</div>';
    h += '</div>';
  } else {
    h += '<div class="picks-grid">';
    for (var i=0; i<shown.length; i++) h += buildPickCard(shown[i]);
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function buildPickCard(p) {
  var sc  = SPORT_COLORS[p.sport] || "#6b7a8d";
  var col = rcol(p.result);
  var rbg = p.result==="WIN" ? "rgba(57,255,20,0.12)" : p.result==="LOSS" ? "rgba(255,60,60,0.12)" : "rgba(240,192,64,0.12)";
  var rbd = p.result==="WIN" ? "#39ff14" : p.result==="LOSS" ? "#ff3b3b" : "#f0c040";
  var cb  = p.result==="WIN" ? "rgba(57,255,20,0.25)" : p.result==="LOSS" ? "rgba(255,60,60,0.25)" : "#1e2530";

  var h = '<div class="pick-card" style="border-color:' + cb + '">';
  h += '<div style="height:3px;background:linear-gradient(90deg,' + sc + ',transparent)"></div>';
  h += '<div style="padding:16px">';
  h += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:11px">';
  h += '<span class="sbadge" style="background:' + sc + '22;color:' + sc + ';border:1px solid ' + sc + '55">' + esc(p.sport) + '</span>';
  h += '<span class="rbadge" style="background:' + rbg + ';color:' + col + ';border:1px solid ' + rbd + '55">' + esc(p.result) + '</span>';
  h += '</div>';
  h += '<div style="margin-bottom:11px">';
  h += '<div style="font-size:0.73rem;color:#6b7a8d;margin-bottom:3px">' + esc(p.gameTime) + '</div>';
  h += '<div style="font-family:Bebas Neue,sans-serif;font-size:0.98rem;letter-spacing:0.04em;line-height:1.3">' + esc(p.awayTeam) + ' <span style="color:#6b7a8d;font-size:0.78rem">@</span> ' + esc(p.homeTeam) + '</div>';
  h += '</div>';
  h += '<div style="background:rgba(200,245,53,0.06);border:1px solid rgba(200,245,53,0.18);border-radius:8px;padding:10px 13px;margin-bottom:11px">';
  h += '<div style="font-size:0.68rem;color:#6b7a8d;letter-spacing:0.08em;margin-bottom:3px">SHARP PICK</div>';
  h += '<div style="color:#c8f535;font-family:Bebas Neue,sans-serif;font-size:1.18rem;letter-spacing:0.04em">' + esc(p.pick) + '</div>';
  h += '<div style="display:flex;gap:12px;margin-top:4px">';
  h += '<span style="font-size:0.73rem;color:#6b7a8d">' + esc(p.betType) + '</span>';
  h += '<span style="font-size:0.73rem;color:#3b82f6">' + esc(p.odds) + '</span>';
  h += '</div></div>';
  h += '<p style="font-size:0.81rem;color:#8a9ab0;line-height:1.55">' + esc(p.analysis) + '</p>';
  h += '</div></div>';
  return h;
}

// ── ADMIN ─────────────────────────────────────────────────────────────────
function buildAdmin() {
  var h = '<div class="page-wrap">';
  h += '<div style="margin-bottom:22px"><h1 style="font-family:Bebas Neue,sans-serif;font-size:2rem;letter-spacing:0.1em;color:#c8f535">ADMIN PANEL</h1><p style="color:#6b7a8d;font-size:0.84rem">Manage picks, users, and settings</p></div>';
  h += '<div style="display:flex;gap:4px;border-bottom:1px solid #1e2530;margin-bottom:26px">';
  h += '<button class="tab at ' + (adminTab==="add"?"on":"") + '" data-at="add">ADD PICKS</button>';
  h += '<button class="tab at ' + (adminTab==="manage"?"on":"") + '" data-at="manage">MANAGE PICKS</button>';
  h += '<button class="tab at ' + (adminTab==="users"?"on":"") + '" data-at="users">USERS</button>';
  h += '</div><div id="ac">' + buildAdminTab() + '</div></div>';
  return h;
}

function buildAdminTab() {
  if (adminTab === "manage") return buildManagePicks();
  if (adminTab === "users")  return buildManageUsers();
  return buildAddPick();
}

function buildAddPick() {
  var h = '<div class="two-col">';
  h += '<div>';
  h += '<div class="card" style="margin-bottom:15px">';
  h += '<h3 style="font-family:Bebas Neue,sans-serif;font-size:1.1rem;letter-spacing:0.08em;margin-bottom:15px;color:#3b82f6">1. SELECT SPORT &amp; DATE</h3>';
  h += '<div class="form-row" style="margin-bottom:15px">';
  h += '<div><span class="lbl">Sport</span><select class="inp" id="p-sport"><option>NFL</option><option>NBA</option><option>NHL</option><option>MLB</option><option>NCAAF</option><option>NCAAM</option></select></div>';
  h += '<div><span class="lbl">Date</span><input class="inp" type="date" id="p-date" value="' + todayStr() + '"></div>';
  h += '</div>';
  h += '<button class="btn-green" id="btn-load">&#128260; LOAD GAMES</button>';
  h += '<div id="g-err"></div>';
  h += '</div>';
  h += '<div class="card" id="g-card" style="display:none">';
  h += '<h3 id="g-title" style="font-family:Bebas Neue,sans-serif;font-size:1.05rem;letter-spacing:0.08em;margin-bottom:11px;color:#3b82f6">2. SELECT GAME</h3>';
  h += '<div id="g-list" class="games-scroll"></div>';

function bindAC() {
var el;
el = ge(“btn-load”); if (el) el.onclick = doLoadGames;
el = ge(“btn-pub”);  if (el) el.onclick = doPublish;

clamp(”[data-pr]”, function(sel) {
sel.onchange = function() {
var id = parseInt(sel.getAttribute(“data-pr”), 10);
for (var i=0; i<PICKS.length; i++) if (PICKS[i].id===id) { PICKS[i].result = sel.value; break; }
refreshAC();
};
});

clamp(”[data-tp]”, function(btn) {
btn.onclick = function() {
var id = parseInt(btn.getAttribute(“data-tp”), 10);
for (var i=0; i<PICKS.length; i++) if (PICKS[i].id===id) { PICKS[i].active = !PICKS[i].active; break; }
refreshAC();
};
});

clamp(”[data-dp]”, function(btn) {
btn.onclick = function() {
var id = parseInt(btn.getAttribute(“data-dp”), 10);
PICKS = PICKS.filter(function(p) { return p.id !== id; });
refreshAC();
};
});

clamp(”[data-tu]”, function(btn) {
btn.onclick = function() {
var id = parseInt(btn.getAttribute(“data-tu”), 10);
for (var i=0; i<USERS.length; i++) if (USERS[i].id===id) { USERS[i].active = !USERS[i].active; break; }
refreshAC();
};
});
}

function refreshAC() {
var ac = ge(“ac”);
if (ac) { ac.innerHTML = buildAdminTab(); bindAC(); }
}

// ── AUTH LOGIC ────────────────────────────────────────────────────────────
function doAuth() {
var errEl = ge(“a-err”);
if (errEl) errEl.innerHTML = “”;
var username = val(“a-user”).trim();
var password = val(“a-pass”).trim();

if (authMode === “login”) {
var found = null;
for (var i=0; i<USERS.length; i++) {
if (USERS[i].username===username && USERS[i].password===password) { found=USERS[i]; break; }
}
if (!found)         { if (errEl) errEl.innerHTML=’<div class="err">Invalid username or password.</div>’; return; }
if (!found.active)  { if (errEl) errEl.innerHTML=’<div class="err">Account deactivated. Contact support.</div>’; return; }
curUser = found; curPage = “picks”; render();
} else {
var email = val(“a-email”).trim(), confirm = val(“a-conf”).trim();
if (!username||!email||!password) { if (errEl) errEl.innerHTML=’<div class="err">All fields required.</div>’; return; }
if (password!==confirm)           { if (errEl) errEl.innerHTML=’<div class="err">Passwords do not match.</div>’; return; }
for (var i=0; i<USERS.length; i++) {
if (USERS[i].username===username) { if (errEl) errEl.innerHTML=’<div class="err">Username taken.</div>’; return; }
}
var nu = { id:Date.now(), username:username, email:email, password:password, role:“user”, active:true, joined:todayStr() };
USERS.push(nu);
curUser = nu; curPage = “picks”; render();
}
}
